name: FEC bulk data pipeline

# Runs daily at 6:00 UTC. Can also be triggered manually.
#
# Conditional fetching: each file's Last-Modified header is compared against
# fec/meta/pipeline_state.json in R2. Files unchanged since the last run are
# skipped automatically — a typical daily run after the first full run will
# complete in seconds.
#
# Prerequisites (GitHub repository secrets required):
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID
#   R2_ACCESS_KEY_ID       — from a Cloudflare R2 API Token
#   R2_SECRET_ACCESS_KEY   — from the same R2 API Token
#   CLOUDFLARE_API_TOKEN   — general Cloudflare API token (used by future sessions)
#
# R2 API Tokens are created at: Cloudflare Dashboard → R2 → Manage R2 API Tokens
# A general Cloudflare API token (used for Wrangler) will NOT authenticate to R2.

on:
  schedule:
    - cron: '0 6 * * *'   # daily 6am UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pipeline dependencies
        run: npm install
        working-directory: scripts

      - name: Run FEC bulk pipeline
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: node scripts/ingest-bulk.js

      - name: Pre-compute KV aggregations
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          KV_NAMESPACE_ID:       ${{ secrets.KV_NAMESPACE_ID }}
          # Node default heap is ~4 GB; indiv aggregation peaked at 3.5 GB
          # at 25M rows in run #4 and OOM'd. Runner has 7 GB total.
          NODE_OPTIONS:          --max-old-space-size=6144
        run: node scripts/precompute-aggregations.js
