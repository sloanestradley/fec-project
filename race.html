<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race — FECLedger</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=IBM+Plex+Sans:wght@400;600&family=IBM+Plex+Serif:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Amplitude Analytics -->
  <script async src="https://cdn.amplitude.com/libs/plugin-session-replay-browser-1.6.22-min.js.gz"></script>
  <style>
    /* Race header — shared base via .page-header and .page-title in styles.css.
       Year-select + seat-class live in #race-header (T-move-race-year-select,
       2026-06-03 — relocated from the since-retired .tabs-bar; T-remove-profile-tabs
       2026-06-04) so they stay visible in the compact header, mirroring the
       menu-btn placement on candidate/committee. */
    /* Controls cluster — right-aligned by .title-meta-stack's flex:1. The cluster
       shrink-wraps to content, insulating the select's shared align-self:stretch
       from the tall header row; .cycle-select align-self:center is a defensive
       belt-and-suspenders against that stretch. */
    .race-header-controls { display:flex; align-items:center; gap:var(--space-8); align-self:flex-start; }
    .race-header-controls .cycle-select { align-self:center; }
    /* Compact: center the cluster in the slim single-line strip (mirrors the
       menu-btn's flex-start → center compact handoff on candidate/committee). */
    #race-header.compact .race-header-controls { align-self:center; }
    #year-select.cycle-select { margin-left:0; }
    /* Senate seat-class indicator — design-system "caption" type role
       (IBM Plex Mono 0.625rem). :empty drops the span from flex flow on House
       races so the empty state introduces no stray gap beside the select. */
    .race-seat-class { font-family:'IBM Plex Mono',monospace; font-size:0.625rem; font-weight:400;
      text-transform:none; color:var(--muted); white-space:nowrap; }
    .race-seat-class:empty { display:none; }

    .race-list { display:flex; flex-direction:column; margin-bottom:var(--space-24);
      border-top:1px solid var(--border); }
  </style>
</head>
<body>

<!-- Top nav -->
<div class="global-banner">
  <p class="global-banner-text">Early build, actively evolving. All data sourced from the FEC public API. Non-partisan by design.</p>
</div>
<nav class="top-nav" id="top-nav">
  <div class="top-nav-inner">
    <a class="top-nav-logo" href="/"><span class="logo-fec">FEC</span><span class="logo-ledger">Ledger</span></a>
    <div class="top-nav-search">
      <button type="button" class="top-nav-search-btn" id="nav-search-btn" aria-label="Open search">
        <svg aria-hidden="true" focusable="false" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Search</span>
      </button>
    </div>
    <div class="top-nav-links">
      <a class="nav-link" href="/races">Races</a>
      <a class="nav-link" href="/feed">Feed</a>
    </div>
    <div class="top-nav-mobile-controls">
      <button class="top-nav-search-toggle" id="top-nav-search-toggle" aria-label="Open search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="hamburger" id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
  <!-- Mobile nav drawer -->
  <nav class="mobile-nav" id="mobile-nav">
    <a class="nav-item" href="/races">Races</a>
    <a class="nav-item" href="/feed">Feed</a>
  </nav>
</nav>

<!-- Main -->
  <div class="main">
  <div class="main-inner">
    <div class="state-msg" id="state-msg">
      <div class="loader"></div><span>Fetching race data from FEC…</span>
    </div>
  </div><!-- /.main-inner -->
  <div id="profile-header-sentinel" aria-hidden="true" style="height:0;pointer-events:none"></div>
  <div class="race-header page-header page-header-reveal" id="race-header" style="display:none">
    <div class="profile-header-row">
      <div class="title-meta-stack">
        <div class="page-title" id="race-title">—</div>
      </div>
      <div class="race-header-controls">
        <span class="race-seat-class" id="race-seat-class"></span>
        <select id="year-select" class="form-select cycle-select" aria-label="Election cycle year"></select>
      </div>
    </div>
  </div>

  <div class="main-inner">
    <!-- T-remove-profile-tabs (race, final pass): the Candidates/Insights tabs
         were retired — the candidate list IS the page (single flowing content).
         Insights was a stub ("Race insights coming soon") and is deferred to
         Phase 4, which will re-add it as a flowing section, not a tab. -->
    <div class="profile-content" id="race-content" style="display:none">
      <!-- Inline cycle-switch error (non-destructive — the prior list stays
           below and usable). Reuses the shared .tab-error family + showTabError. -->
      <div class="tab-error" id="race-switch-error" style="display:none">
        <span class="tab-error-msg"></span>
        <button type="button" class="tab-retry-btn">Retry</button>
      </div>
      <!-- Count + list are held/hidden/rolled-back atomically during a switch. -->
      <div id="race-results-region">
        <!-- Results-count caption (.race-count-header, comma-grouped with
             .results-header — Mono 0.625rem muted). Was .raised-cell-title until
             2026-07-17, when the copy became a count line, not a section title. -->
        <div class="race-count-header" id="race-candidates-label"></div>
        <div class="race-list" id="race-list"></div>
      </div>
    </div>
  </div><!-- /.main-inner -->

  <!-- Cycle-switch loading spinner — fixed/viewport-centered, reuses .state-msg/.loader.
       Shown while a switch fetch is in flight; the results region is held at prior
       height (visibility:hidden) so scroll + compact don't collapse during the wait. -->
  <div class="state-msg" id="race-switch-loader"
       style="display:none; position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); z-index:190;">
    <div class="loader"></div><span>Loading…</span>
  </div>
  <!-- Polite aria-live: announces the new cycle + candidate count on a successful switch. -->
  <div class="sr-only" id="race-live" aria-live="polite"></div>
  </div><!-- /.main -->


<script src="main.js"></script>
<script src="utils.js"></script>
<script>
var urlParams    = new URLSearchParams(window.location.search);
var stateParam   = (urlParams.get('state') || '').toUpperCase();
var districtParam= urlParams.get('district');
var yearParam    = urlParams.get('year') || '2026';
var officeParam  = (urlParams.get('office') || '').toUpperCase();

// In-place cycle-switch state (T-race-inplace-cycle, 2026-06-03)
var cyclesList  = [];    // available cycles, set once in init()
var activeYear  = null;  // currently-rendered cycle (committed only on success)
var switchToken = 0;     // stale-response guard — drops out-of-order switch responses

// ── Param validation ────────────────────────────────────────────────────────
var VALID_STATES = ['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA',
  'HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS',
  'MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA',
  'RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY',
  'DC','AS','GU','MP','PR','VI','US'];
var VALID_OFFICES = ['H','S','P'];

function validateParams() {
  if (!stateParam || !officeParam) return 'No race specified.';
  if (VALID_STATES.indexOf(stateParam) === -1) return 'Invalid state: ' + stateParam;
  if (VALID_OFFICES.indexOf(officeParam) === -1) return 'Invalid office: ' + officeParam;
  if (officeParam === 'H' && districtParam && !/^\d{1,2}$/.test(districtParam)) return 'Invalid district: ' + districtParam;
  var yr = Number(yearParam);
  if (isNaN(yr) || yr < 1980 || yr > 2060 || yr % 2 !== 0) return 'Invalid election year: ' + yearParam;
  return null;
}

// /elections/ endpoint requires lowercase full words, not single-letter codes
function officeApiParam(o) {
  return { H:'house', S:'senate', P:'president' }[o] || o.toLowerCase();
}

// Senate class heuristic — no FEC API field exists for this.
// Verified: /elections/ and /elections/search/ return no class/seat field.
// Class I: 2018, 2024, 2030 … | Class II: 2020, 2026, 2032 … | Class III: 2016, 2022, 2028 …
// Approximate — special elections break the pattern. The FEC /election-dates/
// endpoint has SP/SG/SGR type codes that could detect specials, but financial
// data is cycle-bound (no separate special election cycle in /elections/search/).
function getSenateClass(cycle) {
  var yr = Number(cycle);
  if ((yr - 2018) % 6 === 0) return 'I';
  if ((yr - 2020) % 6 === 0) return 'II';
  if ((yr - 2016) % 6 === 0) return 'III';
  return null;
}

// Fetch available election cycles from /elections/search/
// Response shape: each result has { cycle, district, office, state }
async function fetchCycles() {
  var params = { state: stateParam, office: officeApiParam(officeParam), per_page: 100 };
  if (officeParam === 'H' && districtParam) params.district = districtParam;
  var data = await apiFetch('/elections/search/', params);
  var results = data.results || [];
  // Cap cycles — the API returns projected cycles out to 2060+
  // House: current cycle only (2-year terms)
  // President: current cycle + 2 (4-year terms; next election is always 0–2 years out)
  // Senate: current cycle + 4 (6-year terms; covers both seats' next election in the state)
  var now = new Date().getFullYear();
  var currentCycle = now % 2 === 0 ? now : now + 1;
  var maxCycle = officeParam === 'S' ? currentCycle + 4
              : officeParam === 'P' ? currentCycle + 2
              : currentCycle;
  var seen = {};
  var cycles = [];
  results.forEach(function(r) {
    if (r.cycle <= maxCycle && !seen[r.cycle]) { seen[r.cycle] = true; cycles.push(r.cycle); }
  });
  cycles.sort(function(a, b) { return b - a; });
  return cycles;
}

function buildYearSelector(cycles) {
  var sel = document.getElementById('year-select');
  sel.innerHTML = '';
  cycles.forEach(function(yr) {
    var opt = document.createElement('option');
    opt.value = yr;
    opt.textContent = yr;
    if (String(yr) === String(yearParam)) opt.selected = true;
    sel.appendChild(opt);
  });
  // In-place switch — no full reload (T-race-inplace-cycle). push:true + focus the
  // dropdown are the change-path defaults.
  sel.addEventListener('change', function() {
    loadRace(sel.value);
  });
}

function buildCandidateCard(c) {
  // Race-page variant of the shared candidateCardHTML helper:
  //   - layoutVariant 'inline' — party + incumbent tags live inside .candidate-card-name
  //   - no office tag, no latest-cycle tag (race context is already implicit)
  //   - showStats + showIncumbent + cycleHashYear for race-anchored navigation
  //   - extraTrackProps.race_year for Amplitude analytics
  // includeName:false matches the prior amplitude payload shape on race.html.
  return candidateCardHTML(c, {
    layoutVariant:   'inline',
    showOffice:      false,
    showLatestCycle: false,
    showIncumbent:   true,
    showStats:       true,
    cycleHashYear:   yearParam,
    fromPage:        'race',
    includeName:     false,
    extraTrackProps: { race_year: yearParam }
  });
}

// ── In-place cycle switching (T-race-inplace-cycle) ──────────────────────────
// Build a same-path URL string with ?year= set (preserves /race vs /race.html).
// No hash component — race carries no URL fragment post-T-remove-profile-tabs.
// ROUTING — deliberate divergence (T-profile-flatten decision 5; DO NOT UNIFY):
// race encodes the cycle as a shareable ?year= QUERY PARAM (filter-URL model — a
// race+cycle is a sharable/bookmarkable view), NOT the candidate/committee profile
// pages' in-page #cycle HASH (view-switch model, where the hash drives an in-place
// index↔detail transition). Different interaction models on purpose; keep them apart.
function urlWithYear(year) {
  var url = new URL(window.location.href);
  url.searchParams.set('year', String(year));
  return url.pathname + url.search;
}
// Snap a requested year to the nearest available cycle (init's logic, reusable for
// popstate / hand-edited URLs). Dropdown switches always pass an available cycle.
function snapToCycle(year) {
  var y = Number(year);
  if (cyclesList.indexOf(y) !== -1) return y;
  if (!cyclesList.length) return y;
  return cyclesList.reduce(function(best, c) {
    return Math.abs(c - y) < Math.abs(best - y) ? c : best;
  }, cyclesList[0]);
}
// Page Viewed payload — matches race's existing shape; year is the only thing that
// varies per switch. `source` stays the original ?from= (the reload preserved it).
// `trigger` distinguishes a fresh page load ('load') from an in-place cycle switch
// ('cycle-switch') — race's payload has no `view` field like candidate/committee, so
// without this the two events are indistinguishable (T-race-inplace-cycle-analytics).
function pageViewedPayload(year, trigger) {
  return { page: 'race', state: stateParam, year: String(year), office: officeParam,
           district: districtParam, source: urlParams.get('from') || null, trigger: trigger };
}
// Shared render primitive — count + seat-class + list. Called by init() (first paint,
// keeping init's parallel cold-load) and by loadRace() (each switch). Reads the
// module yearParam, so callers MUST set yearParam before calling this.
function renderRaceContent(results, totalCount) {
  // Count is the TRUE total from /elections/ pagination.count — results.length is
  // capped by per_page (50), so a >50-candidate field (President: 869) would
  // otherwise under-report. The list shows the fetched top-N (sorted by money,
  // server sort=-total_receipts + the client sort below); the label states how
  // much of the field that is. Copy is provisional — restyle pass pending.
  var shown = results.length;
  var count = (typeof totalCount === 'number') ? totalCount : shown;
  document.getElementById('race-candidates-label').textContent =
    count === 0 ? ''
    : count <= shown
      ? 'Showing all ' + count + (count === 1 ? ' candidate' : ' candidates') + ' by total raised'
      : 'Showing top ' + shown + ' of ' + count + ' candidates by total raised';
  // Always-assign so a Senate→Senate switch updates the class (and non-Senate clears it;
  // .race-seat-class:empty then drops the empty span from flow — no stray gap).
  var seatEl = document.getElementById('race-seat-class');
  if (seatEl) {
    var cls = officeParam === 'S' ? getSenateClass(yearParam) : null;
    seatEl.textContent = cls ? 'Class ' + cls + ' seat' : '';
  }
  // Order by money raised, descending — the FEC /elections/ response is unsorted,
  // which interleaves financially-active candidates with no-activity ones. Sort by
  // total_receipts (tiebreak total_disbursements) so the serious candidates lead
  // and non-filers (0/0 — the live API returns 0.0, not null) sink to the bottom.
  // Sort a copy so the caller's cached results array isn't mutated; modern Array
  // .sort is stable, so 0/0 ties keep their original API order.
  var ordered = results.slice().sort(function(a, b) {
    var diff = (b.total_receipts || 0) - (a.total_receipts || 0);
    return diff !== 0 ? diff : (b.total_disbursements || 0) - (a.total_disbursements || 0);
  });
  // Inline empty state (.inline-status-msg) — defined, not a void, and not the
  // full-content #state-msg (which would break non-destructive rollback).
  var list = document.getElementById('race-list');
  list.innerHTML = ordered.length
    ? ordered.map(buildCandidateCard).join('')
    : '<div class="inline-status-msg">No candidates found for this race.</div>';
}
function announceCycle(year, count) {
  var live = document.getElementById('race-live');
  if (!live) return;
  live.textContent = String(year) + ' cycle, ' +
    (count ? count + (count === 1 ? ' candidate' : ' candidates') : 'no candidates');
}
function hideSwitchError() {
  document.getElementById('race-switch-error').style.display = 'none';
}
// Inline, non-destructive, 429-aware (shared showTabError). Retry closes over the
// FAILED year — NOT sel.value, which has been rolled back to the prior cycle.
function showSwitchError(err, retryFn) {
  var el = document.getElementById('race-switch-error');
  showTabError(el, err, "⚠ Couldn't load this cycle.");
  var btn = el.querySelector('.tab-retry-btn');
  if (btn) btn.onclick = retryFn;  // .onclick (not addEventListener) avoids stacking
}

// loadRace — the in-place switch. Commits yearParam + the pushState URL only AFTER the
// fetch succeeds; a failure leaves data, dropdown, and URL coherent on the prior cycle.
// Content-scoped: never re-inits the compact header or touches .compact (the existing
// scroll listener handles the long→short settle when the document shrinks).
async function loadRace(requestedYear, opts) {
  opts = opts || {};
  var doPush   = opts.push !== false;          // dropdown/default push; popstate false
  var resolved = snapToCycle(requestedYear);
  var priorYear = activeYear;                   // rollback target (list never cleared)
  var myToken  = ++switchToken;                 // stale-response guard
  var sel      = document.getElementById('year-select');
  var region   = document.getElementById('race-results-region');
  var loader   = document.getElementById('race-switch-loader');

  // Loading: hold the region's height (hide-not-clear) so scroll + compact persist.
  region.style.visibility = 'hidden';
  loader.style.display = 'flex';
  hideSwitchError();

  var queryParams = { state: stateParam, cycle: String(resolved),
                      office: officeApiParam(officeParam), per_page: 50, sort: '-total_receipts' };
  if (districtParam) queryParams.district = districtParam;

  try {
    var data = await apiFetch('/elections/', queryParams);
    if (myToken !== switchToken) return;        // superseded by a newer switch → drop
    yearParam = String(resolved);               // COMMIT (only on success)
    activeYear = resolved;
    var total = (data.pagination || {}).count;  // true field size (pagination.count)
    renderRaceContent(data.results || [], total); // reads the just-set yearParam
    region.style.visibility = '';
    loader.style.display = 'none';
    sel.value = String(resolved);               // sync dropdown (snap/popstate cases)
    if (doPush) history.pushState({ year: resolved }, '', urlWithYear(resolved));
    amplitude.track('Page Viewed', pageViewedPayload(resolved, 'cycle-switch'));
    announceCycle(resolved, total);
    if (opts.focusSelect !== false) sel.focus();
  } catch (err) {
    if (myToken !== switchToken) return;        // superseded → drop (latest owns the UI)
    region.style.visibility = '';               // un-hide the intact prior list
    loader.style.display = 'none';
    sel.value = String(priorYear);              // snap dropdown back to prior cycle
    showSwitchError(err, function() { loadRace(requestedYear, opts); });  // failed year
    console.error('race cycle switch error:', err);
  }
}

// T-remove-profile-tabs (race, final pass): showTab() retired with the
// Candidates/Insights tabs. The candidate list is the sole, always-visible
// content; the `Tab Switched` event went with it. Race never wrote the URL hash
// (showTab preventDefaulted the anchors), so there's no hash routing to unwind —
// routing stays 100% query-param (?state/office/year/district + ?year switching).

async function init() {
  var hasExplicitYear = urlParams.has('year');
  var fallbackCycles = [2026, 2024, 2022, 2020, 2018];

  amplitude.track('Page Viewed', pageViewedPayload(yearParam, 'load'));

  var validationError = validateParams();
  if (validationError) {
    var el = document.getElementById('state-msg');
    el.className = 'state-msg error';
    el.innerHTML = '⚠ ' + validationError + ' <a href="/races" style="color:inherit">← Back to Races</a>';
    return;
  }

  try {
    var cycles, results, totalCount;   // totalCount = /elections/ pagination.count (true field size)

    if (hasExplicitYear) {
      // Parallel: fetch cycles and candidates simultaneously
      var queryParams = { state: stateParam, cycle: yearParam, office: officeApiParam(officeParam), per_page: 50, sort: '-total_receipts' };
      if (districtParam) queryParams.district = districtParam;

      var settled = await Promise.all([
        fetchCycles().catch(function(err) { console.warn('elections/search failed, using fallback cycles:', err); return null; }),
        apiFetch('/elections/', queryParams)
      ]);

      cycles = (settled[0] && settled[0].length > 0) ? settled[0] : fallbackCycles;
      results = (settled[1].results || []);
      totalCount = (settled[1].pagination || {}).count;

      // If requested year isn't in available cycles, snap to nearest and re-fetch
      if (cycles.indexOf(Number(yearParam)) === -1) {
        var yrNum = Number(yearParam);
        var nearest = cycles.reduce(function(best, c) {
          return Math.abs(c - yrNum) < Math.abs(best - yrNum) ? c : best;
        }, cycles[0]);
        yearParam = String(nearest);
        queryParams.cycle = yearParam;
        var data = await apiFetch('/elections/', queryParams);
        results = data.results || [];
        totalCount = (data.pagination || {}).count;
      }
    } else {
      // Sequential: need cycles first to determine default year
      var fetchedCycles;
      try {
        fetchedCycles = await fetchCycles();
      } catch(err) {
        console.warn('elections/search failed, using fallback cycles:', err);
        fetchedCycles = null;
      }

      cycles = (fetchedCycles && fetchedCycles.length > 0) ? fetchedCycles : fallbackCycles;
      // Default to current cycle, or next upcoming if current has no race
      var nowYear = new Date().getFullYear();
      var curCycle = nowYear % 2 === 0 ? nowYear : nowYear + 1;
      var defaultCycle = cycles.find(function(c) { return c >= curCycle; });
      // cycles is descending, so find() gets the largest >= curCycle; we want the smallest
      defaultCycle = cycles.filter(function(c) { return c >= curCycle; }).pop() || cycles[0];
      yearParam = String(defaultCycle);

      var queryParams = { state: stateParam, cycle: yearParam, office: officeApiParam(officeParam), per_page: 50, sort: '-total_receipts' };
      if (districtParam) queryParams.district = districtParam;
      var data = await apiFetch('/elections/', queryParams);
      results = data.results || [];
      totalCount = (data.pagination || {}).count;
    }

    cyclesList = cycles;
    activeYear = Number(yearParam);
    buildYearSelector(cycles);

    var raceName = formatRaceLabelLong(officeParam, stateParam, districtParam);
    document.getElementById('race-title').textContent = raceName;
    document.title = raceName + ' — FECLedger';   // year-independent — set once

    renderRaceContent(results, totalCount);        // count + seat-class + list (reads yearParam)

    // Canonicalize the URL to the resolved cycle (replaceState — no new history entry)
    // so every history entry carries ?year= and popstate always resolves a cycle.
    history.replaceState({ year: activeYear }, '', urlWithYear(activeYear));

    // Page-level data note (R1.a source line + R1.b completeness caveat) retired
    // 2026-06-01 — race.html isn't yet rich enough to warrant a page-level data
    // note, including a data source. Deliberate divergence from candidate.html /
    // committee.html, which keep their #page-note. Revisit if race.html gains
    // depth. The data-notes-mapping-v2 R1.a/R1.b rows are CUT, not relocated.

    document.getElementById('state-msg').style.display = 'none';
    var headerEl  = document.getElementById('race-header');
    var contentEl = document.getElementById('race-content');
    headerEl.style.removeProperty('display');
    contentEl.style.display = 'block';
    requestAnimationFrame(function(){
      headerEl.classList.add('visible');
      contentEl.classList.add('visible');
    });

    // Compact header — scroll listener (shared helper, utils.js)
    initCompactHeader('race-header');

  } catch(err) {
    var el = document.getElementById('state-msg');
    el.className = 'state-msg error';
    el.textContent = '⚠ Could not load race: ' + err.message;
    console.error('race load error:', err);
  }
}

// Back/forward between cycles → in-place switch (no reload, no re-push). Guarded so the
// search overlay's same-URL popstate (main.js pushes {overlay:true} at the same ?year=)
// is a no-op here: when the resolved year is unchanged, skip the re-fetch entirely.
window.addEventListener('popstate', function() {
  if (!cyclesList.length) return;                 // pre-init — nothing to switch
  var y = new URLSearchParams(window.location.search).get('year');
  if (snapToCycle(y) === activeYear) return;      // no cycle change (e.g. overlay) → skip
  loadRace(y, { push: false, focusSelect: false });
});

init();
</script>

</body>
</html>
