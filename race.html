<body>

<!-- Main -->
  <div class="main">
  <div class="main-inner">
    <div class="state-msg" id="state-msg">
      <div class="loader"></div><span>Fetching race data from FEC…</span>
    </div>
  </div><!-- /.main-inner -->
  <div id="profile-header-sentinel" aria-hidden="true" style="height:0;pointer-events:none"></div>
  <div class="race-header page-header page-header-reveal" id="race-header" style="display:none">

  </div>

  <div class="tabs-bar" id="tabs-bar" style="display:none">
    <a class="tab active" href="#candidates" onclick="showTab('candidates',event)">Candidates</a>
    <a class="tab"        href="#insights"   onclick="showTab('insights',event)">Insights</a>
    <span class="race-seat-class" id="race-seat-class"></span>
    <select id="year-select" class="form-select cycle-select" aria-label="Election cycle year"></select>
  </div>

  <div class="main-inner">

      <div id="tab-candidates">
        <div class="section-title" id="race-candidates-label"></div>
        <div class="race-list" id="race-list"></div>
        <div class="data-note" id="race-note"></div>
      </div>

      </div>
    </div>
  </div><!-- /.main-inner -->

<script src="main.js"></script>
<script src="utils.js"></script>
<script>
var urlParams    = new URLSearchParams(window.location.search);
var stateParam   = (urlParams.get('state') || '').toUpperCase();
var districtParam= urlParams.get('district');
var yearParam    = urlParams.get('year') || '2026';
var officeParam  = (urlParams.get('office') || '').toUpperCase();

// ── Param validation ────────────────────────────────────────────────────────
var VALID_STATES = ['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA',
  'HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS',
  'MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA',
  'RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY',
  'DC','AS','GU','MP','PR','VI','US'];
var VALID_OFFICES = ['H','S','P'];

function validateParams() {
  if (!stateParam || !officeParam) return 'No race specified.';
  if (VALID_STATES.indexOf(stateParam) === -1) return 'Invalid state: ' + stateParam;
  if (VALID_OFFICES.indexOf(officeParam) === -1) return 'Invalid office: ' + officeParam;
  if (officeParam === 'H' && districtParam && !/^\d{1,2}$/.test(districtParam)) return 'Invalid district: ' + districtParam;
  var yr = Number(yearParam);
  if (isNaN(yr) || yr < 1980 || yr > 2060 || yr % 2 !== 0) return 'Invalid election year: ' + yearParam;
  return null;
}

// /elections/ endpoint requires lowercase full words, not single-letter codes
function officeApiParam(o) {
  return { H:'house', S:'senate', P:'president' }[o] || o.toLowerCase();
}

// Senate class heuristic — no FEC API field exists for this.
// Verified: /elections/ and /elections/search/ return no class/seat field.
// Class I: 2018, 2024, 2030 … | Class II: 2020, 2026, 2032 … | Class III: 2016, 2022, 2028 …
// Approximate — special elections break the pattern. The FEC /election-dates/
// endpoint has SP/SG/SGR type codes that could detect specials, but financial
// data is cycle-bound (no separate special election cycle in /elections/search/).
function getSenateClass(cycle) {
  var yr = Number(cycle);
  if ((yr - 2018) % 6 === 0) return 'I';
  if ((yr - 2020) % 6 === 0) return 'II';
  if ((yr - 2016) % 6 === 0) return 'III';
  return null;
}

// Fetch available election cycles from /elections/search/
// Response shape: each result has { cycle, district, office, state }
async function fetchCycles() {
  var params = { state: stateParam, office: officeApiParam(officeParam), per_page: 100 };
  if (officeParam === 'H' && districtParam) params.district = districtParam;
  var data = await apiFetch('/elections/search/', params);
  var results = data.results || [];
  // Cap cycles — the API returns projected cycles out to 2060+
  // House: current cycle only (2-year terms)
  // President: current cycle + 2 (4-year terms; next election is always 0–2 years out)
  // Senate: current cycle + 4 (6-year terms; covers both seats' next election in the state)
  var now = new Date().getFullYear();
  var currentCycle = now % 2 === 0 ? now : now + 1;
  var maxCycle = officeParam === 'S' ? currentCycle + 4
              : officeParam === 'P' ? currentCycle + 2
              : currentCycle;
  var seen = {};
  var cycles = [];
  results.forEach(function(r) {
    if (r.cycle <= maxCycle && !seen[r.cycle]) { seen[r.cycle] = true; cycles.push(r.cycle); }
  });
  cycles.sort(function(a, b) { return b - a; });
  return cycles;
}

function buildYearSelector(cycles) {
  var sel = document.getElementById('year-select');
  sel.innerHTML = '';
  cycles.forEach(function(yr) {
    var opt = document.createElement('option');
    opt.value = yr;
    opt.textContent = yr;
    if (String(yr) === String(yearParam)) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', function() {
    var url = new URL(window.location.href);
    url.searchParams.set('year', sel.value);
    window.location.href = url.toString();
  });
}

function buildCandidateCard(c) {
  var id    = c.candidate_id || (c.candidate_ids && c.candidate_ids[0]);
  var name  = toTitleCase(c.candidate_name || c.name);
  var party = c.party || c.party_full || '';
  var pcls  = partyClass(party);
  var plbl  = partyLabel(party);

  // Link directly to the race's cycle year so the candidate page opens at the right cycle
  var href = id ? '/candidate/' + id + '?from=race#' + yearParam + '#summary' : '#';

  var statsHtml = '';
  if (c.total_receipts != null || c.total_disbursements != null) {
    statsHtml = '<div class="candidate-card-stats">'
      + '<div class="candidate-card-stat"><span class="candidate-card-stat-lbl">Raised</span>'
      + '<span class="candidate-card-stat-val">' + fmt(c.total_receipts) + '</span></div>'
      + '<div class="candidate-card-stat"><span class="candidate-card-stat-lbl">Spent</span>'
      + '<span class="candidate-card-stat-val">' + fmt(c.total_disbursements) + '</span></div>'
      + '<div class="candidate-card-stat"><span class="candidate-card-stat-lbl">Cash on Hand</span>'
      + '<span class="candidate-card-stat-val">' + fmt(c.cash_on_hand_end_period) + '</span></div>'
      + '</div>';
  }

  return '<a class="candidate-card" href="' + href + '"'
    + ' onclick="amplitude.track(\'Candidate Result Clicked\',{candidate_id:' + JSON.stringify(id)
    + ',from_page:\'race\',race_year:' + JSON.stringify(yearParam) + '})">'
    + '<div class="candidate-card-name">' + name
    + (plbl ? '<span class="tag ' + pcls + '">' + plbl + '</span>' : '')
    + (c.incumbent_challenge === 'I' || c.incumbent_challenge_full === 'Incumbent' ? '<span class="tag tag-neutral">Incumbent</span>' : '')
    + '</div>'
    + statsHtml
    + '</a>';
}

function showTab(name, e) {
  if (e) e.preventDefault();
  ['candidates','insights'].forEach(function(t) {
    document.getElementById('tab-'+t).style.display = t===name ? 'block' : 'none';
  });
  document.querySelectorAll('#tabs-bar .tab').forEach(function(el) {
    el.classList.toggle('active', el.getAttribute('href') === '#'+name);
  });
  if (e) amplitude.track('Tab Switched', { tab: name, state: stateParam, office: officeParam, year: yearParam });
}

async function init() {
  var hasExplicitYear = urlParams.has('year');
  var fallbackCycles = [2026, 2024, 2022, 2020, 2018];

  amplitude.track('Page Viewed', {
    page: 'race', state: stateParam, year: yearParam, office: officeParam, district: districtParam,
    source: urlParams.get('from') || null
  });

  var validationError = validateParams();
  if (validationError) {
    var el = document.getElementById('state-msg');
    el.className = 'state-msg error';
    el.innerHTML = '⚠ ' + validationError + ' <a href="/races" style="color:inherit">← Back to Races</a>';
    return;
  }

  try {
    var cycles, results;

    if (hasExplicitYear) {
      // Parallel: fetch cycles and candidates simultaneously
      var queryParams = { state: stateParam, cycle: yearParam, office: officeApiParam(officeParam), per_page: 50 };
      if (districtParam) queryParams.district = districtParam;

      var settled = await Promise.all([
        fetchCycles().catch(function(err) { console.warn('elections/search failed, using fallback cycles:', err); return null; }),
        apiFetch('/elections/', queryParams)
      ]);

      cycles = (settled[0] && settled[0].length > 0) ? settled[0] : fallbackCycles;
      results = (settled[1].results || []);

      // If requested year isn't in available cycles, snap to nearest and re-fetch
      if (cycles.indexOf(Number(yearParam)) === -1) {
        var yrNum = Number(yearParam);
        var nearest = cycles.reduce(function(best, c) {
          return Math.abs(c - yrNum) < Math.abs(best - yrNum) ? c : best;
        }, cycles[0]);
        yearParam = String(nearest);
        queryParams.cycle = yearParam;
        var data = await apiFetch('/elections/', queryParams);
        results = data.results || [];
      }
    } else {
      // Sequential: need cycles first to determine default year
      var fetchedCycles;
      try {
        fetchedCycles = await fetchCycles();
      } catch(err) {
        console.warn('elections/search failed, using fallback cycles:', err);
        fetchedCycles = null;
      }

      cycles = (fetchedCycles && fetchedCycles.length > 0) ? fetchedCycles : fallbackCycles;
      // Default to current cycle, or next upcoming if current has no race
      var nowYear = new Date().getFullYear();
      var curCycle = nowYear % 2 === 0 ? nowYear : nowYear + 1;
      var defaultCycle = cycles.find(function(c) { return c >= curCycle; });
      // cycles is descending, so find() gets the largest >= curCycle; we want the smallest
      defaultCycle = cycles.filter(function(c) { return c >= curCycle; }).pop() || cycles[0];
      yearParam = String(defaultCycle);

      var queryParams = { state: stateParam, cycle: yearParam, office: officeApiParam(officeParam), per_page: 50 };
      if (districtParam) queryParams.district = districtParam;
      var data = await apiFetch('/elections/', queryParams);
      results = data.results || [];
    }

    buildYearSelector(cycles);

    var raceName = formatRaceLabelLong(officeParam, stateParam, districtParam);

    document.getElementById('race-title').textContent = raceName;

    // Senate class label in tabs bar
    if (officeParam === 'S') {
      var cls = getSenateClass(yearParam);
      var seatEl = document.getElementById('race-seat-class');
      if (seatEl && cls) seatEl.textContent = 'Class ' + cls + ' seat';
    }

    document.getElementById('race-candidates-label').textContent =
      'Candidates (' + results.length + ')';
    document.title = raceName + ' — FECLedger';

    var list = document.getElementById('race-list');
    list.innerHTML = results.length
      ? results.map(buildCandidateCard).join('')
      : '<div class="placeholder">No candidates found for this race in the FEC system.</div>';

    document.getElementById('race-note').textContent =
      'Financial figures are cycle totals as reported to the FEC. Candidates may not yet have filed for all periods.';

    document.getElementById('state-msg').style.display = 'none';
    var headerEl  = document.getElementById('race-header');
    var tabsBarEl = document.getElementById('tabs-bar');
    var contentEl = document.getElementById('race-content');
    headerEl.style.removeProperty('display');
    tabsBarEl.style.display = 'flex';
    contentEl.style.display = 'block';
    requestAnimationFrame(function(){
      headerEl.classList.add('visible');
      tabsBarEl.classList.add('visible');
      contentEl.classList.add('visible');
    });

    // Compact header — scroll listener on sentinel
    (function() {
      var sentinelEl    = document.getElementById('profile-header-sentinel');
      var mainEl        = document.querySelector('.main');
      var headerH       = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--header-h')) || 56;
      var isCompact      = false;
      var compactHeaderH = null;
      var suppressUntil  = 0;
      function update() {
        if (Date.now() < suppressUntil) return;
        var compact = sentinelEl.getBoundingClientRect().top < headerH;
        if (compact === isCompact) return;
        isCompact = compact;
        suppressUntil = Date.now() + 100;
        if (compact) {
          var fullH = headerEl.offsetHeight;
          headerEl.classList.add('compact');
          if (compactHeaderH === null) compactHeaderH = headerEl.offsetHeight;
          mainEl.style.paddingBottom = Math.min(80, Math.max(0, fullH - compactHeaderH)) + 'px';
          tabsBarEl.style.top = (headerH + compactHeaderH) + 'px';
        } else {
          headerEl.classList.remove('compact');
          mainEl.style.paddingBottom = '';
          tabsBarEl.style.top = headerH + 'px';
        }
      }
      window.addEventListener('scroll', update, { passive: true });
      update();
    })();

  } catch(err) {
    var el = document.getElementById('state-msg');
    el.className = 'state-msg error';
    el.textContent = '⚠ Could not load race: ' + err.message;
    console.error('race load error:', err);
  }
}

init();
</script>

</body>
</html>
