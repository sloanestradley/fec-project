<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Races — FECLedger</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=IBM+Plex+Sans:wght@400;600&family=IBM+Plex+Serif:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Amplitude Analytics -->
  <script async src="https://cdn.amplitude.com/libs/plugin-session-replay-browser-1.6.22-min.js.gz"></script>
  <style>
    .main { overflow:visible; min-width:0; }

    /* Location search bar: hero search field + a borderless year select that
       reuses race.html's .cycle-select (Oswald, transparent). No box → it reads
       as text vertically centered against the hero input, not a mismatched chip;
       inline at every width (it's narrow), so no wrap. .race-search-bar adds the
       stacking context so the native select's dropdown layers above the results. */
    .race-search-bar { position:relative; z-index:10; }
    .race-search-form { display:flex; align-items:center; gap:var(--space-16); }
    .race-search-form .search-field { flex:1; min-width:0; }
    .race-search-form .form-input { flex:1; min-width:0; }   /* fill the .search-field */
    /* base .cycle-select is align-self:stretch (for race.html's tall header),
       which top-aligns a fixed-height item in this row — center it as race.html
       itself does in .race-header-controls; drop its header-only margin-left:auto. */
    .race-search-form .cycle-select { align-self:center; flex-shrink:0; margin-left:0; }

    /* Result cue — first child of .results-area, whose gutter padding aligns it */
    .race-cue { font-family:'IBM Plex Mono',monospace; font-size:0.625rem;
      letter-spacing:var(--ls-expanded); text-transform:uppercase; color:var(--muted);
      margin:0 0 var(--space-16); }
    #results-list { display:flex; flex-direction:column; }
    .race-row-meta { display:flex; gap:var(--space-16); font-family:'IBM Plex Mono',monospace;
      font-size:0.625rem; color:var(--muted); margin-top:var(--space-4); }

    /* STATES PASS seam: per-state group header (Mono label style, hairline divider).
       Rendered only when geo.flags.multi_state. President stays ungrouped above. */
    .race-state-group + .race-state-group { margin-top:var(--space-32); }
    /* Presidential multi-state: the ungrouped President card sits directly above the
       first state group — space them like adjacent groups. Adjacency-scoped so it
       fires ONLY when a President .race-card precedes the group (multi-state
       presidential); a group that leads the list (multi-state non-presidential, or
       after President is dropped on error) has no preceding card → no stray top gap. */
    .race-card + .race-state-group { margin-top:var(--space-32); }
    .race-state-header { font-family:'IBM Plex Mono',monospace; font-size:0.625rem;
      letter-spacing:var(--ls-expanded); text-transform:uppercase; color:var(--subtle);
      padding-bottom:var(--space-8); border-bottom:1px solid var(--border); margin-bottom:var(--space-8); }
    /* Caption A (live omission note) / Caption B (dark collapse note) within a group */
    /* Horizontal --space-8 matches .race-card's own horizontal padding, so the note's
       text aligns with the card text above it; --space-16 vertical gives it room. */
    .race-omit-note, .race-collapse-note { font-family:'IBM Plex Sans',sans-serif;
      font-size:0.75rem; color:var(--muted); padding:var(--space-16) var(--space-8); }

    /* Message states (errors + empty) */
    .race-state-msg { padding:var(--space-64) var(--space-16); text-align:center; color:var(--muted); }
    .race-state-msg .race-state-title { font-family:'Oswald',sans-serif; font-size:1.25rem;
      text-transform:uppercase; color:var(--navy-deep); margin-bottom:var(--space-8); }
    .race-state-msg .retry-btn { margin-top:var(--space-16); }
  </style>
</head>
<body>

<!-- Top nav -->
<div class="global-banner">
  <p class="global-banner-text">Early build, actively evolving. All data sourced from the FEC public API. Non-partisan by design.</p>
</div>
<nav class="top-nav" id="top-nav">
  <div class="top-nav-inner">
    <a class="top-nav-logo" href="/"><span class="logo-fec">FEC</span><span class="logo-ledger">Ledger</span></a>
    <div class="top-nav-search">
      <button type="button" class="top-nav-search-btn" id="nav-search-btn" aria-label="Open search">
        <svg aria-hidden="true" focusable="false" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Search</span>
      </button>
    </div>
    <div class="top-nav-links">
      <a class="nav-link" href="/races">Races</a>
      <a class="nav-link" href="/feed">Feed</a>
    </div>
    <div class="top-nav-mobile-controls">
      <button class="top-nav-search-toggle" id="top-nav-search-toggle" aria-label="Open search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="hamburger" id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
  <!-- Mobile nav drawer -->
  <nav class="mobile-nav" id="mobile-nav">
    <a class="nav-item" href="/races">Races</a>
    <a class="nav-item" href="/feed">Feed</a>
  </nav>
</nav>

<!-- Main -->
  <div class="main">
  <div class="main-inner main-inner-narrow">

    <div class="page-header page-header--browse">
      <div class="page-title">Races</div>
    </div>

    <!-- Location search + year -->
    <div class="search-bar-wrap race-search-bar">
      <form class="race-search-form" id="search-form" onsubmit="return false">
        <div class="search-field">
          <svg class="search-field-icon" aria-hidden="true" focusable="false" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="form-input" id="loc-input" autocomplete="off" spellcheck="false"
            placeholder="Search by address or zip code"
            aria-label="Search by address or ZIP code"/>
          <button type="submit" class="form-search-btn sr-only" aria-label="Search"></button>
        </div>
        <!-- Borderless year select — reuses race.html's .cycle-select so the two
             surfaces rhyme; sits as vertically-centered text beside the hero input. -->
        <select id="year-select" class="form-select cycle-select" aria-label="Election cycle year"></select>
      </form>
    </div>

    <!-- State: bare (initial — the placeholder is the whole prompt) -->
    <div id="state-bare"></div>

    <!-- State: loading -->
    <div id="state-loading" style="display:none">
      <div class="state-msg"><div class="loader"></div><span>Finding races…</span></div>
    </div>

    <!-- State: results (cue + tiles share the .results-area gutter padding) -->
    <div id="state-results" style="display:none">
      <div class="results-area">
        <div class="race-cue" id="race-cue"></div>
        <div id="results-list"></div>
      </div>
    </div>

    <!-- State: message (errors + empty) -->
    <div id="state-message" style="display:none">
      <div class="race-state-msg" id="state-message-inner"></div>
    </div>

  </div><!-- /.main-inner -->
  </div><!-- /.main -->


<script src="main.js"></script>
<script src="utils.js"></script>
<script src="races-resolver.js"></script>
<script>
amplitude.track('Page Viewed', { page: 'races' });

// ── Year range ────────────────────────────────────────────────────────────────
// Floor 2012 (geocod.io cd113 floor + FEC Senate/President detail floor). Ceiling
// = the widest per-office cap (Senate + 4). Single dropdown offers even years
// floor→ceiling, default = current cycle. Picking a future year (> currentCycle)
// resolves server-side to a state-only degrade (House omitted — its district
// lines aren't published yet); Senate/President still render.
var now = new Date().getFullYear();
var currentCycle = (now % 2 === 0) ? now : now + 1;
var FLOOR_YEAR = 2012;
var CEILING_YEAR = currentCycle + 4;

var ZIP_RE = /^\d{5}$/;

var yearParam = currentCycle;   // active election year
var currentInput = null;        // { type:'zip'|'address', q } or null (bare)
var resolveToken = 0;           // stale-response guard (rapid year switches / searches)

// ── State wrappers ────────────────────────────────────────────────────────────

function showState(name) {
  ['bare', 'loading', 'results', 'message'].forEach(function(s) {
    document.getElementById('state-' + s).style.display = (s === name) ? 'block' : 'none';
  });
}

// Message state (errors + empty). retryFn optional → renders a Retry button.
function showMessage(title, body, retryFn) {
  var el = document.getElementById('state-message-inner');
  el.innerHTML = '<div class="race-state-title">' + title + '</div>'
    + '<div>' + body + '</div>'
    + (retryFn ? '<div><button class="retry-btn" id="msg-retry">Retry</button></div>' : '');
  if (retryFn) document.getElementById('msg-retry').addEventListener('click', retryFn);
  showState('message');
}

function showResolveError(errorType) {
  amplitude.track('Location Search Error', { error_type: errorType || 'unknown' });
  switch (errorType) {
    case 'not_found':
      return showMessage('Location not found',
        'We couldn’t find that location. Check the spelling, or try a ZIP code.');
    case 'low_accuracy':
      return showMessage('Address too vague',
        'That address wasn’t specific enough. Add a street number, or search by ZIP code.');
    case 'cycle_out_of_range':
      return showMessage('Year not covered',
        'FECLedger covers federal elections from 2012 onward.');
    case 'geocoder_unavailable':
      return showMessage('Lookup unavailable',
        'Location lookup is temporarily unavailable. Please try again in a moment.',
        resolveLocation);
    default:
      return showMessage('Something went wrong',
        'We couldn’t resolve that location. Please try again.', resolveLocation);
  }
}

// ── Year dropdown ─────────────────────────────────────────────────────────────

function populateYears() {
  var years = [];
  for (var y = CEILING_YEAR; y >= FLOOR_YEAR; y -= 2) years.push(y);
  document.getElementById('year-select').innerHTML = years.map(function(y) {
    return '<option value="' + y + '">' + y + '</option>';
  }).join('');
}

// ── Resolve + render ──────────────────────────────────────────────────────────

function keyOf(item) { return item.office + '|' + item.state + '|' + (item.district || ''); }

function resolveLocation() {
  if (!currentInput) { showState('bare'); return; }
  var token = ++resolveToken;
  showState('loading');

  var url = '/api/geo/resolve?type=' + currentInput.type
    + '&q=' + encodeURIComponent(currentInput.q)
    + '&cycle=' + yearParam;

  fetch(url).then(function(r) { return r.json(); }).then(function(geo) {
    if (token !== resolveToken) return;                 // superseded — drop
    if (!geo || geo.error) return showResolveError(geo && geo.error);
    if (geo.flags && geo.flags.territory) {
      fireLocationSearch(geo, 0);
      return showMessage('No federal races here',
        'FECLedger covers U.S. House, Senate, and presidential races. This location doesn’t have any.');
    }
    renderRaces(geo, yearParam, token);
  }).catch(function() {
    if (token !== resolveToken) return;
    showResolveError('geocoder_unavailable');
  });
}

function skeletonTile(item, year) {
  return raceTileHTML({ office: item.office, state: item.state, district: item.district,
    seatStatus: null, cycle: year });
}

// Order: President → Senate → House (decision #2 — same in every layout).
// House is sorted by district NUMBER ascending (predictable for a voter). We
// deliberately do NOT use geocod's overlap-proportion order — for a ZIP crossing
// several districts you live in exactly one; the others just clip the ZIP, so
// there's no meaningful "primary" district and proportion order reads as arbitrary.
function orderPlan(plan) {
  var byOffice = { P: [], S: [], H: [] };
  plan.forEach(function(i) { (byOffice[i.office] || byOffice.H).push(i); });
  byOffice.H.sort(function(a, b) { return parseInt(a.district, 10) - parseInt(b.district, 10); });
  return byOffice.P.concat(byOffice.S, byOffice.H);
}

// Multi-state ZIP layout (§4b): President ungrouped at the top (national — belongs
// to no state), then one group per state. State groups are ordered ALPHABETICALLY
// by displayed name (predictable, same rationale as the numerical district order —
// proportion "majority-first" reads as arbitrary to a voter). Peer groups, no
// dominant styling; a per-state 2d caption slots under each header later. A spanned
// state always has >=1 House district, so a group is never empty (we still guard).
function buildGroupedSkeleton(geo, plan, year) {
  var html = plan.filter(function(i) { return i.office === 'P'; })
    .map(function(i) { return skeletonTile(i, year); }).join('');

  // Unique states (districts + any districtless state), excluding DC, A→Z by name.
  var stateSet = {};
  (geo.districts || []).forEach(function(d) { stateSet[d.state] = true; });
  (geo.states || []).forEach(function(s) { if (s !== 'DC') stateSet[s] = true; });
  var stateOrder = Object.keys(stateSet).sort(function(a, b) {
    return (STATE_NAMES[a] || a).localeCompare(STATE_NAMES[b] || b);
  });

  stateOrder.forEach(function(st) {
    var items = orderPlan(plan.filter(function(i) { return i.office !== 'P' && i.state === st; }));
    if (!items.length) return;                          // never render a bare header
    html += '<div class="race-state-group">'
      + '<div class="race-state-header">' + (STATE_NAMES[st] || st) + '</div>'
      + items.map(function(i) { return skeletonTile(i, year); }).join('')
      + '</div>';
  });
  return html;
}

// ── Senate captions ───────────────────────────────────────────────────────────
// Caption A (LIVE): a Senate that isn't listed for the cycle gets an explicit note
// instead of vanishing. Describes the filing signal ("no race listed"), never a
// seat-class claim (empty /elections/ ≠ "seat isn't up").
// Renders in BOTH layouts as of 2026-07-16 — this reverses decision #3 for the
// Senate only (it shipped multi-state-only in 2d, where the neighbour-state
// contrast made a correct absence look like a bug; consistency won out). House
// never returns null, and a null President in a presidential cycle is a data
// anomaly rather than "not up" — both stay silent drops.
// The year is explicit (not "this cycle") because the note now has to carry alone
// on a flat result, without the group header / neighbour-state contrast.
function senateOmissionNote(state, year) {
  return '<div class="race-omit-note">No ' + (STATE_NAMES[state] || state)
    + ' Senate race in ' + year + '</div>';
}

// Caption B (DARK): a state running a regular + special Senate election in one
// cycle (GA-2020) — /elections/ mashes both into one result. Detecting a genuine
// collapse needs the term-class dataset (the SG+G shortcut false-positives on
// special-only cycles like AZ-2020), so this ships dormant behind the flag and
// renders nothing until that data lands. Copy is fixed so enabling is one flip.
var SENATE_COLLAPSE_ENABLED = false;
function senateCollapseNote(race) {
  if (!SENATE_COLLAPSE_ENABLED) return '';   // DARK — gated on the term-class dataset
  return '<div class="race-collapse-note">' + (STATE_NAMES[race.state] || race.state)
    + ' held two U.S. Senate elections this cycle — a regular and a special; candidates for both are shown together.</div>';
}

// Amplitude: one Location Search per successful resolve. PRIVACY (D4) — logs
// input_type + result shape only, NEVER the ZIP/address value. result_count is the
// honest rendered-race count.
function fireLocationSearch(geo, count) {
  amplitude.track('Location Search', {
    input_type: currentInput.type, cycle: yearParam, result_count: count,
    multi_state: !!(geo.flags && geo.flags.multi_state),
    multi_district: !!(geo.flags && geo.flags.multi_district),
  });
}

function renderRaces(geo, year, token) {
  var plan = planRaces(geo, year);
  if (!plan.length) {                                   // e.g. DC in a non-presidential year
    fireLocationSearch(geo, 0);
    return showMessage('No federal races',
      'No federal races for this location in ' + year + '.');
  }

  var where = currentInput.type === 'zip' ? ('ZIP ' + currentInput.q) : 'searched address';
  document.getElementById('race-cue').textContent = 'Races for ' + where + ' in ' + year;

  // Skeleton tiles paint immediately (race name shows; meta skeletons until each
  // office's /elections/ call lands). Multi-state ZIP → per-state groups; else flat.
  var list = document.getElementById('results-list');
  var multiState = !!(geo.flags && geo.flags.multi_state);
  list.innerHTML = multiState
    ? buildGroupedSkeleton(geo, plan, year)
    : orderPlan(plan).map(function(i) { return skeletonTile(i, year); }).join('');
  showState('results');

  // Progressive per-card resolve (grouping-agnostic — querySelector finds each
  // tile by data-race-key wherever it sits). Each card is one /elections/ call:
  //  - non-null  → swap skeleton for the resolved tile
  //  - null      → office not listed this cycle → drop the card; a Senate also
  //                leaves the Caption A note behind (both layouts)
  //  - error     → MVP: drop the card too (a transient FEC error is currently
  //                indistinguishable from office-absent; a per-card error tile is banked)
  var settled = 0, rendered = 0;
  plan.forEach(function(item) {
    fetchRaceSummary(item, year).then(function(race) {
      if (token !== resolveToken) return;
      var el = list.querySelector('[data-race-key="' + keyOf(item) + '"]');
      if (!el) return;
      if (race === null) {
        // Senate not listed this cycle → Caption A in BOTH layouts: at the end of
        // its state group (multi-state) or the end of the list (flat, which is
        // single-state by definition) — the same "after this state's races"
        // placement either way. House/President drop silently (see senateOmissionNote).
        var group = el.closest('.race-state-group');   // read BEFORE remove — el detaches
        el.remove();
        if (item.office === 'S') {
          (group || list).insertAdjacentHTML('beforeend', senateOmissionNote(item.state, year));
        }
      } else {
        // Caption B (dark) rides after a resolved Senate card — '' until enabled.
        el.outerHTML = raceTileHTML(race) + (item.office === 'S' ? senateCollapseNote(race) : '');
        rendered++;
      }
    }).catch(function() {
      if (token !== resolveToken) return;
      var el = list.querySelector('[data-race-key="' + keyOf(item) + '"]');
      if (el) el.remove();
    }).then(function() {
      if (token !== resolveToken) return;
      settled++;
      if (settled === plan.length) {
        if (rendered === 0) showMessage('No federal races', 'No federal races for ' + where + ' in ' + year + '.');
        fireLocationSearch(geo, rendered);   // one Location Search per resolve
      }
    });
  });
}

// ── Input + URL ───────────────────────────────────────────────────────────────

function submitSearch(e) {
  if (e) e.preventDefault();
  var raw = document.getElementById('loc-input').value.trim();
  if (!raw) return;
  if (ZIP_RE.test(raw)) {
    currentInput = { type: 'zip', q: raw };
    syncUrl();                    // ZIP is shareable → pushState ?zip&year
  } else {
    currentInput = { type: 'address', q: raw };
    dropUrl();                    // address is private → no URL; strip any stale ?zip
  }
  resolveLocation();
}

// ZIP path only: push a shareable ?zip=&year= entry.
function syncUrl() {
  if (!currentInput || currentInput.type !== 'zip') return;
  var u = new URL(location.href);
  u.search = '';
  u.searchParams.set('zip', currentInput.q);
  u.searchParams.set('year', yearParam);
  history.pushState(null, '', u.toString());
}

// Address path: geocode-and-discard extends to the URL — drop any params so the
// address is never in a shareable/back-navigable URL.
function dropUrl() {
  if (location.search) history.replaceState(null, '', location.pathname);
}

function onPopState() {
  var p = new URLSearchParams(location.search);
  var urlZip = p.get('zip');
  var urlYearRaw = parseInt(p.get('year'), 10);
  var desiredYear = validYear(urlYearRaw) ? urlYearRaw : currentCycle;
  var desiredZip = (urlZip && ZIP_RE.test(urlZip)) ? urlZip : null;

  // No-op when nothing changed (e.g. the global search overlay's same-URL popstate).
  var curZip = (currentInput && currentInput.type === 'zip') ? currentInput.q : null;
  if (desiredZip === curZip && desiredYear === yearParam) return;

  yearParam = desiredYear;
  document.getElementById('year-select').value = String(yearParam);
  if (desiredZip) {
    document.getElementById('loc-input').value = desiredZip;
    currentInput = { type: 'zip', q: desiredZip };
    resolveLocation();
  } else {
    currentInput = null;
    document.getElementById('loc-input').value = '';
    showState('bare');
  }
}

function validYear(y) {
  return y && y >= FLOOR_YEAR && y <= CEILING_YEAR && y % 2 === 0;
}

// ── Init ──────────────────────────────────────────────────────────────────────

(function init() {
  populateYears();
  var yearSelect = document.getElementById('year-select');
  yearSelect.addEventListener('change', function() {
    yearParam = parseInt(yearSelect.value, 10);
    if (currentInput) { syncUrl(); resolveLocation(); }   // re-resolve the active search
  });

  var p = new URLSearchParams(location.search);
  var urlYearRaw = parseInt(p.get('year'), 10);
  if (validYear(urlYearRaw)) yearParam = urlYearRaw;
  yearSelect.value = String(yearParam);

  var urlZip = p.get('zip');
  if (urlZip && ZIP_RE.test(urlZip)) {
    document.getElementById('loc-input').value = urlZip;
    currentInput = { type: 'zip', q: urlZip };
    resolveLocation();
  } else {
    showState('bare');
  }

  document.getElementById('search-form').addEventListener('submit', submitSearch);
  window.addEventListener('popstate', onPopState);

  // Race Tile Clicked — delegated; fires before the tile's <a> navigation (the
  // Amplitude beacon survives unload). Logs the RACE's public identity + seat
  // status, never the user's searched location.
  // seat_status reads the data-seat-kind ATTRIBUTE, not the rendered text (which
  // it did until 2026-07-16): the kind is a stable low-cardinality enum
  // ('incumbent'|'open'|'multiple'|'none'), so display copy and the analytics enum
  // move independently, and a name never enters the payload. A loading tile has no
  // attribute yet → null, which now unambiguously means "clicked before resolve"
  // (an incumbent race used to log null too, since it rendered no seat text).
  document.getElementById('results-list').addEventListener('click', function(e) {
    var card = e.target.closest('.race-card');
    if (!card) return;
    var key = (card.getAttribute('data-race-key') || '').split('|');
    amplitude.track('Race Tile Clicked', {
      office: key[0] || null, state: key[1] || null, district: key[2] || null,
      cycle: yearParam, seat_status: card.getAttribute('data-seat-kind') || null,
    });
  });
})();
</script>

</body>
</html>
